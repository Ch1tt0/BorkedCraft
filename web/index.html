<!doctype html>
<html lang="en_US">
  <head>
    <!-- Info -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BorkedCraft</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/index.css" />

    <!-- More Info -->
    <meta name="description" content="A game." />

    <meta property="og:title" content="BorkedCraft" />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://ch1tt0.github.io/BorkedCraft/" />
    <meta property="og:image" content="./icon.png" />
    <meta property="og:image:alt" content="Icon." />

    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./icon.png" type="image/png" />
  </head>
  <body>
    <span style="text-align: center; font-size: xx-large">Loading...</span>
    <!-- Loading logic -->
    <script>
      // Select the node that will be observed for mutations
      const targetNode = document.body;
      const loadingText = document.getElementsByTagName("span")[0];

      // Options for the observer (which mutations to observe)
      const config = { childList: true };

      // Callback function to execute when mutations are observed
      const callback = (mutationList, observer) => {
        for (const mutation of mutationList) {
          mutation.addedNodes.forEach((node) => {
            if (node.nodeName === "CANVAS") {
              loadingText.remove();
            }
          });
        }
      };

      // Create an observer instance linked to the callback function
      const observer = new MutationObserver(callback);

      // Start observing the target node for configured mutations
      observer.observe(targetNode, config);

      // Later, you can stop observing
      //   observer.disconnect();
    </script>

    <!-- Fix for AudioContext. -->
    <script>
      (function () {
        // An array of all contexts to resume on the page
        const audioContextList = [];

        // An array of various user interaction events we should listen for
        const userInputEventNames = [
          "click",
          "contextmenu",
          "auxclick",
          "dblclick",
          "mousedown",
          "mouseup",
          "pointerup",
          "touchend",
          "keydown",
          "keyup",
        ];

        // A proxy object to intercept AudioContexts and
        // add them to the array for tracking and resuming later
        self.AudioContext = new Proxy(self.AudioContext, {
          construct(target, args) {
            const result = new target(...args);
            audioContextList.push(result);
            return result;
          },
        });

        // To resume all AudioContexts being tracked
        function resumeAllContexts(event) {
          let count = 0;

          audioContextList.forEach((context) => {
            if (context.state !== "running") {
              context.resume();
            } else {
              count++;
            }
          });

          // If all the AudioContexts have now resumed then we
          // unbind all the event listeners from the page to prevent
          // unnecessary resume attempts
          if (count == audioContextList.length) {
            userInputEventNames.forEach((eventName) => {
              document.removeEventListener(eventName, resumeAllContexts);
            });
          }
        }

        // We bind the resume function for each user interaction
        // event on the page
        userInputEventNames.forEach((eventName) => {
          document.addEventListener(eventName, resumeAllContexts);
        });
      })();
    </script>
    <!-- Game -->
    <script type="module">
      import init from "./BorkedCraft.js";

      init().catch((error) => {
        if (
          !error.message.startsWith(
            "Using exceptions for control flow, don't mind me. This isn't actually an error!",
          )
        ) {
          throw error;
        }
      });
    </script>
  </body>
